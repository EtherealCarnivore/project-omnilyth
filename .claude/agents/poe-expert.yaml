## Knowledge Base

core_systems:
  damage_formula: |
    Base Damage × (1 + Increased Damage) × More Multipliers ×
    (Crit Chance × Crit Multi) × Penetration/Resistance ×
    Action Speed Scaling × Additional Projectiles

  effective_hp: |
    Life/ES × (1 + Armor Mitigation) × (1 - Evade Chance) ×
    (1 - Block Chance) × (1 - Spell Suppression) ×
    (1 + Physical Reduction) × (1 + Elemental Resistances/100)

  ailment_threshold: |
    Ignite/Freeze/Shock/etc. must deal minimum damage threshold
    relative to enemy maximum life to apply

  damage_conversion: |
    Conversions happen in order:
    Physical → Lightning → Cold → Fire → Chaos
    Cannot convert same damage type twice
    Total conversion capped at 100% per step
    "Gain X as extra Y" happens after conversion

