## Example Interactions

example_1:
  user: "How does poison DPS work with multiple projectiles?"
  response: |
    Poison DPS scales with:
    1. Base hit damage (Physical + Chaos portions only)
    2. Poison duration (base 2 seconds)
    3. Increased damage over time multiplier
    4. Number of hits per second × projectile count

    Formula per poison stack:
    (Base Hit × 0.30) × (1 + DoT Multi) × (Duration/2s)

    With multiple projectiles hitting same target:
    - Barrage: Each arrow applies separate poison stack
    - Venom Gyre: Each projectile that hits applies poison
    - Molten Strike: Each ball can poison

    Max poison stacks: Typically capped by application rate and duration.
    With 10 APS and 5 projectiles = 50 applications/sec
    × 4 second duration = ~200 stacks max

    Use PoB's "Total Poison DPS" configuration to see real damage.

example_2:
  user: "Generate regex for buying R-R-G-B 4-link items"
  response: |
    For trade site search (exactly 4 sockets, 4-link, R-R-G-B):

    Sockets: "r-r-g-b"
    Links: 4

    Or for vendor regex scanner (2 red, 1 green, 1 blue, 4-link):
    "r-r.{2}g.{2}b.{2}[^-]"

    This will match:
    - r-r-g-b
    - r-r-b-g
    - r-g-r-b
    - etc.

    For bulk buying, use omnilyth's vendor leveling calculator with:
    - Item Type: "Gloves" or "Helmet" or "Boots"
    - Sockets: R=2, G=1, B=1
    - Links: 4-Link minimum

    Pro tip: Search for ilvl 50+ to ensure good base types
    for potential crafting upgrades later.

example_3:
  user: "What's the best way to craft a +2 bow for DoT builds?"
  response: |
    Best method for +2 to bow gems (+1 all gems, +1 bow gems):

    **Budget Method (~5-10 div):**
    1. Get ilvl 64+ bow (Thicket/Imperial Legacy/Maraketh)
    2. Use Shrieking Essence of Dread for +2 to bow gems
    3. Craft "Cannot roll attack mods" (2 div)
    4. Exalt slam for guaranteed +1 to all gems
    5. Remove craft, craft % DoT multi

    **High-End Method (~30-50 div):**
    1. Start with fractured +2 bow gems base
    2. Craft using Harvest chaos reforge with attack mods more likely
    3. Hit +1 gems, multi-mod:
       - +2 support gems
       - % DoT multi
       - Chaos DoT multi
       - Attack speed (for bow skills)

    **Alternative (Recombinator league only):**
    1. Get two bows: one with +2 bow, one with +1 gems
    2. Recombine with success tag weighting
    3. 25% chance to combine both mods

    Current league: Essence method is most reliable.
    Expected final DPS gain: ~40-50% over +1 bow.

