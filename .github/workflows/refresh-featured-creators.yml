name: Refresh featured creators

# Auto-refreshes the avatar / banner URLs in src/config/featuredCreators.js
# by running scripts/refresh-featured-creators.js. YouTube serves tokenised
# CDN URLs that rotate occasionally; this keeps the live site current
# without a manual local-run-and-commit cycle.
#
# Triggers:
#   - schedule: every 6 hours (offset 15 min off-the-hour to avoid the
#     cron rush; GitHub-Actions schedules drift under load)
#   - workflow_dispatch: manual trigger via the Actions tab

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # commit + push refreshed URLs back to master
  actions: write    # trigger the deploy workflow on change

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run refresh script (writes config in place if URLs changed)
        run: npm run featured-creators:refresh -- --write

      - name: Commit + push + trigger deploy if anything changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain src/config/featuredCreators.js)" ]]; then
            git add src/config/featuredCreators.js
            git commit -s -m "chore: refresh featured creator avatar/banner URLs"
            git push
            # GITHUB_TOKEN pushes don't auto-trigger other workflows, so
            # explicitly dispatch the deploy.
            gh workflow run deploy.yml
            echo "URLs refreshed; deploy.yml triggered."
          else
            echo "URLs already current; nothing to do."
          fi
